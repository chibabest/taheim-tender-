name: Daily PRAZ + NGO Tender Alert
on:
  schedule:
    - cron: '0 6 * * *' # 8am CAT = 6am UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install axios cheerio nodemailer

      - name: Run Scraper + Email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: harris.tenders@gmail.com
        run: |
          node -e "
          const axios = require('axios');
          const cheerio = require('cheerio');
          const nodemailer = require('nodemailer');

          const KEYWORDS = ['solar','pv','electrical','construction','civil','power','energy','grid','borehole','inverter'];
          const MIN_VALUE = 20000;

          async function scrapePRAZ() {
            try {
              const { data } = await axios.get('https://portal.praz.org.zw/tenders', { timeout: 20000 });
              const $ = cheerio.load(data);
              let tenders = [];
              $('.tender-table tr').slice(1).each((i, row) => {
                const cols = $(row).find('td');
                if (cols.length < 4) return;
                const title = $(cols[1]).text().trim();
                const deadline = $(cols[2]).text().trim();
                const value = parseFloat($(cols[3]).text().replace(/[\$,]/g,'')) || 0;
                const link = 'https://portal.praz.org.zw' + $(cols[1]).find('a').attr('href');
                if (KEYWORDS.some(kw => title.toLowerCase().includes(kw)) && value >= MIN_VALUE) {
                  tenders.push(\`PRAZ: \${title} | USD $\${value.toLocaleString()} | Deadline: \${deadline} | \${link}\`);
                }
              });
              return tenders;
            } catch(e) { return [\`PRAZ Error: \${e.message}\`]; }
          }

          async function scrapeUNDP() {
            try {
              const { data } = await axios.get('https://procurement-notices.undp.org/search.cfm?cur=USD&org=UND&cat=Works&cntry=ZWE');
              const $ = cheerio.load(data);
              let tenders = [];
              $('.vacancy').slice(0,10).each((i, item) => {
                const title = $(item).find('a').first().text().trim();
                const link = 'https://procurement-notices.undp.org/' + $(item).find('a').attr('href');
                if (KEYWORDS.some(kw => title.toLowerCase().includes(kw))) {
                  tenders.push(\`UNDP: \${title} | \${link}\`);
                }
              });
              return tenders;
            } catch(e) { return [\`UNDP Error: \${e.message}\`]; }
          }

          (async () => {
            const results = [...await scrapePRAZ(),...await scrapeUNDP()];
            const actualTenders = results.filter(r =>!r.includes('Error'));

            console.log('Found:', actualTenders.length, 'tenders');
            console.log('All results:', results);

            if (actualTenders.length > 0) {
              const transporter = nodemailer.createTransport({
                service: 'gmail',
                auth: { user: process.env.GMAIL_USER, pass: process.env.GMAIL_PASS }
              });
              await transporter.sendMail({
                from: process.env.GMAIL_USER,
                to: process.env.TO_EMAIL,
                subject: \`PRAZ + UNDP Tender Alert - \${new Date().toDateString()}\`,
                text: actualTenders.join('\\n\\n') + '\\n\\n---\\nErrors: ' + results.filter(r => r.includes('Error')).join('; ')
              });
              console.log('Email sent:', actualTenders.length, 'tenders');
            } else {
              console.log('No matching tenders today. Log:', results);
            }
          })();
          "
